name: Release gofontsubset

on:
  push:
    branches:
      - claude/great-knuth-CM099
    paths:
      - 'gofontsubset/**'
      - '.github/workflows/go-release.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  RELEASE_TAG: v0.1.0

defaults:
  run:
    working-directory: gofontsubset

jobs:
  release-windows:
    name: release-windows-${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [amd64]
    env:
      CGO_ENABLED: 1
      GOARCH: ${{ matrix.arch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build GUI
        run: go build -ldflags "-H windowsgui" -o gofontsubset.exe .

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp gofontsubset.exe README.md "dist/"
          cd dist
          7z a "gofontsubset_${RELEASE_TAG}_windows-${{ matrix.arch }}.zip" gofontsubset.exe README.md

      - name: Upload exe as build artifact
        uses: actions/upload-artifact@v7
        with:
          name: gofontsubset_${{ env.RELEASE_TAG }}_windows-${{ matrix.arch }}
          path: gofontsubset/gofontsubset.exe

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: gofontsubset ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          prerelease: false
          body: |
            Build of the Go (Fyne) gofontsubset GUI (from PR #1, branch `claude/great-knuth-CM099`).

            **Asset:** `gofontsubset.exe` — Windows ${{ matrix.arch }} GUI. Requires `hb-subset` available on PATH for subsetting.
          files: |
            gofontsubset/gofontsubset.exe
            gofontsubset/dist/gofontsubset_${{ env.RELEASE_TAG }}_windows-${{ matrix.arch }}.zip
